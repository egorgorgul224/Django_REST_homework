services:
  web:
    build: .
    command: bash -c "python manage.py collectstatic -c --noinput && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env
    container_name: app
    volumes:
      - .:/app
      - static_files:/app/static
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_files:/app/static
    depends_on:
      - web

  db:
    image: postgres:17
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}" ]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    env_file:
      - .env
    image: redis:6
    volumes:
      - redis_data:/data

  celery:
    build: .
    env_file:
      - .env
    command: bash -c "celery -A config  worker -l INFO"
    depends_on:
      - db
      - redis
      - web

  celery_beat:
    build: .
    env_file:
      - .env
    command: bash -c "celery -A config beat -l INFO -S django"
    depends_on:
      - db
      - redis
      - web
      - celery

volumes:
  postgres_data:
  static_files:
  redis_data: